<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <title>Page not found — Pat Lawler</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #0f1115;
        --text: #e8eaed;
        --muted: #9aa0aa;
        --accent: #5b9dff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
      }
      .code {
        margin: 0;
        font-size: 5.5rem;
        font-weight: 800;
        line-height: 1;
        color: var(--accent);
      }
      h1 { margin: 0.5rem 0 0; font-size: 1.6rem; }
      p { color: var(--muted); margin: 0.75rem 0 0; }
      a {
        display: inline-block;
        margin-top: 1.75rem;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        background: var(--accent);
        color: #0b0d10;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <h1>Page not found</h1>
      <p>This one took a wrong turn — let's get you back on course.</p>
      <a href="/">Back to patlawler.com</a>
    </main>
  </body>
</html>
